<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marzzatino</title>
</head>

<body>

    <!-- Botones de Configuración y Perfil-->
    

      <!-- Botón volver -->
      
      <a href="../menu.html" class="btn-volver">
        <img src="../images/boton-salir.png" alt="volver">
      </a>
    
      <!-- config -->

      <div class="config-body">
        <div class="config-header">CONFIGURACION</div>
        
        <hr class="hr-config">
      
        <div class="sonido">
          <div class="label-box">
            <p>Sonido UX/UI</p>
          </div>
          
          <audio id="audio" controls hidden>
            <source src="tu-audio.mp3" type="audio/mp3">
          </audio>
        
          <div class="volume-container">
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
          </div>
        </div>

        <script src="../../backend/scripts/utils/controladorAudio.js"></script>
      </div>

      

    <!-- barra de navegación -->

    <div class="navbar">
      <a href="tienda.html" class="nav-item">
        <img src="../images/cofre.png" alt="Tienda">
        <span class="nav-text">TIENDA</span>
      </a>
    
      <a href="../menu.html" class="nav-item">
        <img src="../images/boton-castle.png" alt="Menu">
        <span class="nav-text">MENU</span>
      </a>
    
      <a href="misiones.html" class="nav-item">
        <img src="../images/boton-mision.png" alt="Misiones">
        <span class="nav-text">MISIONES</span>
      </a>
    
      <a href="estadisticas.html" class="nav-item">
        <img src="../images/estadisticas.png" alt="Estadísticas">
        <span class="nav-text">ESTADISTICAS</span>
      </a>
    </div>

    <script type="module" src="../../backend/config/firebase-config.js"></script>
    <script type="module" src="../../backend/scripts/auth/auth.js"></script>
    <script type="module">
      import { checkAuthState, logout } from '../backend/scripts/auth/auth.js';

      // Verificar estado de autenticación al cargar la página
      checkAuthState();
    </script>
</body>

</html>
