  <!-- Script para controlar el volumen E iniciar la música -->
  <script type="module">
    import { setVolume, playMusic } from '../../backend/functions/misc/musicPlayer.js';

    // 🎵 Música de fondo (igual que antes)
    const volumeSlider = document.getElementById('volume');
    document.addEventListener('DOMContentLoaded', () => {
      playMusic();
    });

    if (volumeSlider) {
      const savedVolume = localStorage.getItem('musicVolume');
      if (savedVolume !== null) {
        volumeSlider.value = savedVolume;
        setVolume(parseFloat(savedVolume));
      } else {
        setVolume(parseFloat(volumeSlider.value));
      }

      volumeSlider.addEventListener('input', (event) => {
        const volume = parseFloat(event.target.value);
        setVolume(volume);
        localStorage.setItem('musicVolume', volume);
      });
    }
  </script>

  <script type="module">
    import { setEffectsVolume, playClickSound, wireClickSound } from "../../backend/functions/misc/soundEffects.js";

    wireClickSound();

    const effectsSlider = document.getElementById("effects-volume");
    if (effectsSlider) {
      const saved = localStorage.getItem("effectsVolume");
      if (saved !== null) effectsSlider.value = saved;
      setEffectsVolume(effectsSlider.value);

      effectsSlider.addEventListener("input", (e) => {
        setEffectsVolume(e.target.value);
        playClickSound(); // preview
      });
    }
  </script>

  <script type="module">
    import { checkAuthState, deleteAccount, reauthenticate } from '../../backend/functions/auth/auth.js';

    // Verificar estado de autenticación al cargar la página
    checkAuthState();

    const confirmDeleteBtn = document.getElementById("confirm-delete-btn");
    const reauthBtn = document.getElementById("reauth-btn");
    const reauthModal = document.getElementById("reauth-modal");
    const passwordInput = document.getElementById("reauth-password");

    confirmDeleteBtn.onclick = () => {
        document.getElementById("confirm-delete-modal").style.display = "none";
        reauthModal.style.display = "flex";
    };

    reauthBtn.onclick = () => {
        const password = passwordInput.value;
        if (!password) {
            alert("Por favor, ingrese su contraseña.");
            return;
        }

        reauthenticate(password).then(() => {
            // Re-authentication successful
            return deleteAccount();
        }).then(() => {
            // Deletion successful
            alert("Tu cuenta ha sido eliminada permanentemente.");
            window.location.href = '../login.html';
        }).catch((error) => {
            console.error("Error en el proceso de eliminación:", error.code, error.message);
            // Handle re-authentication and deletion errors
            switch (error.code) {
                case 'auth/wrong-password':
                    alert("Contraseña incorrecta. Por favor, inténtelo de nuevo.");
                    break;
                case 'auth/user-mismatch':
                     alert("Las credenciales proporcionadas no corresponden al usuario actual.");
                     break;
                case 'auth/requires-recent-login':
                    // This case should theoretically be handled by our re-auth flow, but as a fallback:
                    alert("Por seguridad, esta operación requiere que inicies sesión de nuevo.");
                    break;
                default:
                    alert("Ocurrió un error inesperado al intentar eliminar la cuenta.");
            }
            // Clear password field for security
            passwordInput.value = "";
        });
    };
  </script>

<script>
      const modal = document.getElementById("myModal");
      const btnAjustes = document.getElementById("mas-ajustes");
      const spanClose = document.querySelector(".modal .close");
    
      // abrir modal
      btnAjustes.onclick = () => {
        modal.style.display = "flex";
      };
    
      // cerrar modal
      spanClose.onclick = () => {
        modal.style.display = "none";
      };
    
      // cerrar al clickear fuera del modal
      window.onclick = (event) => {
        if (event.target === modal) {
          modal.style.display = "none";
        }
      };

      const confirmDeleteModal = document.getElementById("confirm-delete-modal");
      const openConfirmDeleteBtn = document.getElementById("eliminar-cuenta-btn");
      const closeConfirmDeleteBtn = document.querySelector(".close-confirm-delete");
      const cancelDeleteBtn = document.getElementById("cancel-delete-btn");
      
      openConfirmDeleteBtn.onclick = () => {
        confirmDeleteModal.style.display = "flex";
      };

      closeConfirmDeleteBtn.onclick = () => {
        confirmDeleteModal.style.display = "none";
      };

      cancelDeleteBtn.onclick = () => {
        confirmDeleteModal.style.display = "none";
      };

      // Re-auth modal logic
      const reauthModalEl = document.getElementById("reauth-modal");
      const closeReauthBtn = document.querySelector(".close-reauth");
      const cancelReauthBtn = document.getElementById("cancel-reauth-btn");

      closeReauthBtn.onclick = () => {
        reauthModalEl.style.display = "none";
      };

      cancelReauthBtn.onclick = () => {
        reauthModalEl.style.display = "none";
      };

      document.getElementById("creditos").addEventListener("click", function() {
        window.location.href = "creditos.html";
    });
</script>
