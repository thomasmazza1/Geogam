<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .form-container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            width: 350px;
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .form-container label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #444;
        }

        .form-container input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .form-container input:focus {
            border-color: #4e73df;
            outline: none;
        }

        .form-container button {
            width: 100%;
            padding: 12px;
            background: #1cc88a;
            border: none;
            color: #fff;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .form-container button:hover {
            background: #17a673;
        }

        .form-container .link {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        .form-container .link a {
            color: #4e73df;
            text-decoration: none;
            font-weight: bold;
        }

        .form-container .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Iniciar Sesión</h2>
        <form id="form-login">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" required>

            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" required>

            <div id="mensaje-error" class="error-message"></div>

            <button type="submit">Entrar</button>
        </form>
        <div class="link">
            ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
        </div>
    </div>
    <script type="module" src="../backend/scripts/auth/login.js"></script>
</body>
</html>
