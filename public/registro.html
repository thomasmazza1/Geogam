<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./styles/styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Marzzatino</title>
  </head>

  <body>
    <div id="main-content">
      <div class="form-container">
        <div class="title-container">CREAR CUENTA</div>
        <hr />
        <form id="registrationForm">
          <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="NOMBRE"
            required
          />

          <input
            type="text"
            id="apellido"
            name="apellido"
            placeholder="APELLIDO"
            required
          />

          <input
            type="text"
            id="usuario"
            name="usuario"
            placeholder="USUARIO"
            required
          />

          <input
            type="email"
            id="email"
            name="email"
            placeholder="CORREO ELECTRÓNICO"
            required
          />

          <input
            type="password"
            id="password"
            name="password"
            placeholder="CONTRASEÑA"
            required
          />

          <div id="mensaje-error" class="error-message"></div>

          <button type="submit">REGISTRARSE</button>
        </form>

        <div class="link">
          ¿YA TIENES CUENTA? <a href="login.html">INICIA SESIÓN</a>
        </div>
      </div>

      <script type="module" src="../backend/functions/auth/registro.js"></script>
    </div>
  </body>
</html>
